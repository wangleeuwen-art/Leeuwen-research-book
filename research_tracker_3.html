<html lang="en">
<head>

<title>Equity Research</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#f4f6f9;color:#1a1a2e;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.5;min-height:100dvh}
input,textarea,select{font-size:16px!important;font-family:inherit}
textarea{resize:vertical}
::-webkit-scrollbar{display:none}
button{cursor:pointer;border:none;background:none;color:inherit;font-family:inherit}
button:disabled{opacity:.4;pointer-events:none}

:root{
  --bg:#f4f6f9; --surface:#ffffff; --surface2:#f0f4fa;
  --navy:#0d2147; --mid:#1e3a6e; --nv:#2563eb;
  --br:#3b82f6; --pl:#dbeafe; --pl2:#eff6ff;
  --s3:#374151; --s4:#6b7280; --s5:#9ca3af; --s6:#d1d5db;
  --ok-bg:#f0fdf4; --ok-bd:#86efac; --ok-t:#15803d;
  --no-bg:#fef2f2; --no-bd:#fca5a5; --no-t:#dc2626;
  --amber-bg:#fffbeb; --amber-bd:#fcd34d; --amber-t:#d97706;
}

.safe-top{padding-top:max(env(safe-area-inset-top),14px)}
.safe-bot{padding-bottom:max(env(safe-area-inset-bottom),20px)}
.safe-x{padding-left:max(env(safe-area-inset-left),16px);padding-right:max(env(safe-area-inset-right),16px)}

.page{min-height:100dvh;background:var(--bg)}
.top-bar{background:#fff;border-bottom:1px solid var(--s6);box-shadow:0 1px 3px rgba(0,0,0,.06)}
.top-bar.sticky{position:sticky;top:0;z-index:10}

.wrap{max-width:576px;margin:0 auto}
.row{display:flex;align-items:center}
.row.sb{justify-content:space-between}
.row.gap{gap:8px}
.row.base{align-items:baseline}
.col{display:flex;flex-direction:column}
.f1{flex:1}.ml-a{margin-left:auto}

.stack{display:flex;flex-direction:column;gap:12px}
.stack8{display:flex;flex-direction:column;gap:8px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

.card{background:#fff;border-radius:14px;border:1px solid var(--s6);overflow:hidden;transition:border-color .15s;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card.upcoming{border-color:var(--br);border-style:dashed}
.card-head{padding:11px 14px;display:flex;align-items:center;justify-content:space-between;background:#f8faff;border-bottom:1px solid var(--s6)}
.card-head.upcoming{background:var(--pl2)}
.card-body{padding:12px 14px}

.chip{background:var(--surface2);border:1px solid var(--s6);border-radius:8px;padding:9px 11px}
.chip.ok{background:var(--ok-bg);border-color:var(--ok-bd)}
.chip.no{background:var(--no-bg);border-color:var(--no-bd)}
.chip .cl{font-size:10px;color:var(--s4);margin-bottom:3px;line-height:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-transform:uppercase;letter-spacing:.04em}
.chip .cv{font-family:ui-monospace,monospace;font-size:13px;font-weight:700;line-height:1.2;color:var(--s3)}
.chip.ok .cv{color:var(--ok-t)}
.chip.no .cv{color:var(--no-t)}

.rxn-tag{font-size:12px;font-weight:700;padding:3px 9px;border-radius:6px}
.rxn-pos{background:var(--ok-bg);color:var(--ok-t);border:1px solid var(--ok-bd)}
.rxn-neg{background:var(--no-bg);color:var(--no-t);border:1px solid var(--no-bd)}
.rxn-neu{background:var(--pl2);color:var(--mid);border:1px solid var(--pl)}

.btn{border-radius:9px;font-weight:700;transition:.15s;padding:9px 16px;font-size:13px}
.btn.ac{background:var(--nv);color:#fff}
.btn.ac:hover{background:var(--mid)}
.btn.ghost{border:1px solid var(--s6);color:var(--s4);background:#fff}
.btn.ghost:hover{border-color:var(--br);color:var(--nv)}
.btn.sm{padding:6px 12px;font-size:12px;border-radius:7px}
.btn.full{width:100%}
.btn-icon{font-size:17px;padding:4px 7px;color:var(--s4);transition:.15s;border-radius:6px}
.btn-icon:hover{color:var(--nv)}
.btn-refresh{background:#fff;border:1px solid var(--s6);color:var(--nv);border-radius:7px;padding:5px 11px;font-size:12px;font-family:ui-monospace,monospace;transition:.15s}
.btn-refresh:hover{border-color:var(--br)}
.btn-expand{width:100%;padding-top:9px;margin-top:4px;border-top:1px solid var(--s6);font-size:11px;color:var(--s4);display:flex;align-items:center;justify-content:center;gap:5px;transition:.15s;letter-spacing:.04em;text-transform:uppercase}
.btn-expand:hover{color:var(--nv)}
.btn-edit{background:#fff;border:1px solid var(--s6);color:var(--s4);border-radius:7px;padding:5px 11px;font-size:12px;transition:.15s;margin-top:12px}
.btn-edit:hover{border-color:var(--br);color:var(--nv)}

.inp{width:100%;background:#fff;border:1px solid var(--s6);color:var(--s3);border-radius:9px;padding:10px 12px;outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--br);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.inp::placeholder{color:var(--s5)}
.inp.area{resize:vertical}
.lbl{font-size:11px;color:var(--s4);display:block;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.field{margin-bottom:12px}

.note-lbl{font-size:10px;font-weight:700;color:var(--nv);letter-spacing:.14em;text-transform:uppercase;margin-bottom:6px;opacity:.7}
.note-txt{font-size:13px;color:var(--s3);line-height:1.7}
.note-blk{margin-bottom:14px}

/* thesis box */
.thesis-card{background:#fff;border:1px solid var(--s6);border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04);margin-bottom:4px}
.thesis-head{padding:11px 14px;background:#f0f4fa;border-bottom:1px solid var(--s6);display:flex;align-items:center;justify-content:space-between}
.thesis-label{font-size:11px;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:.1em}
.thesis-body{padding:14px;font-size:13px;color:var(--s3);line-height:1.75;white-space:pre-wrap}
.thesis-body.empty{color:var(--s5);font-style:italic}
.thesis-area{width:100%;background:#fff;border:none;color:var(--s3);padding:14px;font-size:13px;line-height:1.75;outline:none;resize:vertical;min-height:120px;font-family:inherit}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:600px){.overlay{align-items:center}}
.sheet{background:#fff;border:1px solid var(--s6);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:92dvh;overflow-y:auto;box-shadow:0 -4px 24px rgba(0,0,0,.1)}
@media(min-width:600px){.sheet{border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.15)}}
.sheet-hdr{display:flex;align-items:center;justify-content:space-between;padding:17px 20px 12px;border-bottom:1px solid var(--s6)}
.sheet-body{padding:16px 20px 28px}
.sheet-close{font-size:22px;color:var(--s4);line-height:1;padding:2px 6px}
.sheet-close:hover{color:var(--s3)}

.ticker-card{background:#fff;border:1px solid var(--s6);border-radius:14px;padding:16px;text-align:left;width:100%;display:block;transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.ticker-card:hover{border-color:var(--br);box-shadow:0 2px 8px rgba(37,99,235,.1)}

.brand-label{font-size:10px;color:var(--nv);letter-spacing:.18em;text-transform:uppercase;opacity:.6;margin-bottom:2px;font-family:ui-monospace,monospace}
.brand-title{font-size:20px;font-weight:700;color:var(--navy);letter-spacing:-.02em}
.bc-back{font-size:13px;color:var(--nv);font-family:ui-monospace,monospace;letter-spacing:.04em}
.bc-sep{color:var(--s6);font-size:14px;margin:0 4px}
.bc-sym{font-size:14px;font-weight:700;color:var(--navy)}

.live-price{font-family:ui-monospace,monospace;font-weight:700;font-size:19px;color:var(--navy)}
.chg-pos{font-family:ui-monospace,monospace;font-size:13px;font-weight:700;color:var(--ok-t);margin-left:6px}
.chg-neg{font-family:ui-monospace,monospace;font-size:13px;font-weight:700;color:var(--no-t);margin-left:6px}
.live-sub{font-size:11px;color:var(--s4);margin-top:1px}

.news-card{background:#fff;border:1px solid var(--s6);border-radius:12px;padding:13px 15px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.news-lbl{font-size:10px;color:var(--nv);letter-spacing:.18em;text-transform:uppercase;margin-bottom:9px;font-family:ui-monospace,monospace}
.news-item{font-size:12px;color:var(--s3);padding:7px 0;border-bottom:1px solid var(--s6);line-height:1.55}
.news-item:last-child{border-bottom:none}

.notes-area{border-top:1px solid var(--s6);background:#fafbfd;padding:14px}

.edit-area{width:100%;background:#fff;border:1px solid var(--s6);color:var(--s3);border-radius:8px;padding:10px 12px;font-size:14px;line-height:1.65;outline:none;transition:border-color .15s;font-family:inherit}
.edit-area:focus{border-color:var(--br);box-shadow:0 0 0 3px rgba(59,130,246,.1)}

.pulse{animation:pulse 1.5s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.fade{animation:fi .18s ease}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

.mt1{margin-top:4px}.mt2{margin-top:8px}.mt3{margin-top:12px}.mt4{margin-top:16px}
.mb1{margin-bottom:4px}.mb2{margin-bottom:8px}.mb3{margin-bottom:12px}.mb4{margin-bottom:16px}
.pt2{padding-top:8px}.pb3{padding-bottom:12px}
.gap2{gap:8px}.gap3{gap:12px}
</style>
</head>

      {id:"hims-q4-23",label:"Q4 2023",date:"Feb 26, 2024",rev_est:235,rev_act:247,eps_est:-0.02,eps_act:0.01,

      {id:"docs-q2-fy26",label:"Q2 FY26",date:"Nov 6, 2025",rev_est:157.1,rev_act:168.5,eps_est:0.38,eps_act:0.45,
       metrics:[{l:"NRR (TTM)",v:"~113% ↓"},{l:"EBITDA Margin",v:"59%"},{l:"Op Inc Beat",v:"+16%"}],
       ah:"-12%",d1o:"~$58",d1c:"~$50",net:"~-25%",
       pre:"Stock ~$65. Multiple still elevated (~50x fwd P/E). Bar high relative to where fundamentals are trending.",
       said:"Revenue $168.5M vs $157.1M — solid beat (+7.2%). EPS $0.45 vs $0.38 (+18.7%). But growth inflated by easy comps. NRR still declining.",
       why:"Fell -12% AH, ultimately -25% from pre-earnings. A 7% beat at 50x P/E isn't enough when every thesis metric is heading the wrong way.",
       upd:"Critical inflection. Market signals it has priced out the AI re-rating. Bears in control."},
      {id:"docs-q3-fy26",label:"Q3 FY26",date:"Feb 5, 2026",rev_est:178.0,rev_act:185.1,eps_est:0.45,eps_act:0.46,
       metrics:[{l:"NRR (TTM)",v:"112% ↓↓"},{l:"EBITDA Margin",v:"60%"},{l:"Q4 Guide",v:"$143M (4%)"}],
       ah:"-5% AH → -25% D+1",d1o:"~$35",d1c:"~$25",net:"~-28%",
       pre:"Stock ~$37 — down 55% from ATH. Sellside still had buy ratings. Market partially discounted bad news but hadn't priced a guidance cut.",
       said:"Revenue $185.1M — beat. EPS $0.46 vs $0.45 — beat. But Q4 guidance: $143-144M (4% growth) vs implied ~$175M. MFN agreements disrupted pharma selling season.",
       why:"-5% initial AH, then -25% to -28% next trading day. Analysts slashed targets: Goldman $46→$34, BMO $45→$25, Evercore $55→$30.",
       upd:"Expectation lifecycle complete. NRR at 112% and declining. Key question: cyclical MFN disruption or structural pharma budget contraction?"},
      {id:"docs-q4-fy26",label:"Q4 FY26",date:"May 2026",rev_est:143,rev_act:null,eps_est:0.28,eps_act:null,
       metrics:[{l:"NRR (TTM)",v:"TBD"},{l:"EBITDA Margin",v:"TBD"},{l:"Pharma Bookings",v:"TBD"}],
       ah:null,d1o:null,d1c:null,net:null,pre:"",said:"",why:"",upd:""}
    ]}
  }
};

const SK="eq_v3",AK="eq_api";
const load=()=>{try{const d=localStorage.getItem(SK);return d?JSON.parse(d):null}catch{return null}};
const save=d=>{try{localStorage.setItem(SK,JSON.stringify(d))}catch{}};
const getKey=()=>localStorage.getItem(AK)||"";
const saveKey=k=>localStorage.setItem(AK,k);

const bm=(e,a)=>{if(e==null||a==null)return null;const d=a-e,p=((d/Math.abs(e))*100).toFixed(1);return{diff:d.toFixed(1),pct:p,pos:d>=0}};
const rxnCls=v=>{if(!v)return"rxn-neu";const s=String(v);if(s.includes("+"))return"rxn-pos";if(s.startsWith("-")||s.includes("–"))return"rxn-neg";return"rxn-neu"};

const Chip=({l,v,beat})=>(
  <div className={beat===true?"chip ok":beat===false?"chip no":"chip"}>
    <div className="cl">{l}</div>
    <div className="cv">{v||"—"}</div>
  </div>
);

const NoteBlock=({label,text})=>text?(
  <div className="note-blk">
    <div className="note-lbl">{label}</div>
    <div className="note-txt">{text}</div>
  </div>
):null;

const Modal=({title,onClose,children})=>(
  <div className="overlay" onClick={onClose}>
    <div className="sheet" onClick={e=>e.stopPropagation()}>
      <div className="sheet-hdr">
        <span style={{fontWeight:700,fontSize:15,color:"#fff"}}>{title}</span>
        <button className="sheet-close" onClick={onClose}>×</button>
      </div>
      <div className="sheet-body">{children}</div>
    </div>
  </div>
);

const Field=({label,k,ph,s,ss,type="text",optional})=>(
  <div className="field">
    <label className="lbl">{label}{optional&&<span style={{color:"var(--s5)",marginLeft:4}}>optional</span>}</label>
    <input type={type} value={s[k]||""} onChange={e=>ss(x=>({...x,[k]:e.target.value}))} placeholder={ph} className="inp"/>
  </div>
);

const AreaField=({label,k,ph,s,ss,optional})=>(
  <div className="field">
    <label className="lbl">{label}{optional&&<span style={{color:"var(--s5)",marginLeft:4}}>optional</span>}</label>
    <textarea value={s[k]||""} onChange={e=>ss(x=>({...x,[k]:e.target.value}))} placeholder={ph} rows={2} className="inp area"/>
  </div>
);

function App(){
  const [data,setData]=useState(null);
  const [view,setView]=useState("dash");
  const [sym,setSym]=useState(null);
  const [open,setOpen]=useState({});
  const [editing,setEditing]=useState(null);
  const [draft,setDraft]=useState({});
  const [thesisEdit,setThesisEdit]=useState(false);
  const [thesisDraft,setThesisDraft]=useState("");
  const [live,setLive]=useState({});
  const [busy,setBusy]=useState(null);
  const [modal,setModal]=useState(null);
  const [apiKey,setApiKey]=useState(getKey);
  const [newT,setNewT]=useState({symbol:"",company:"",sector:"",exchange:"NASDAQ"});
  const [newQ,setNewQ]=useState({});

  useEffect(()=>{setData(load()||SEED)},[]);

  const persist=d=>{setData(d);save(d)};
  const toggle=id=>setOpen(o=>({...o,[id]:!o[id]}));
  const startEdit=q=>{setEditing(q.id);setDraft({pre:q.pre||"",said:q.said||"",why:q.why||"",upd:q.upd||""})};
  const saveEdit=(ticker,qid)=>{
    const d=JSON.parse(JSON.stringify(data));
    const i=d.tickers[ticker].quarters.findIndex(q=>q.id===qid);
    d.tickers[ticker].quarters[i]={...d.tickers[ticker].quarters[i],...draft};
    persist(d);setEditing(null);
  };
  const saveThesis=(ticker)=>{
    const d=JSON.parse(JSON.stringify(data));
    d.tickers[ticker].thesis=thesisDraft;
    persist(d);setThesisEdit(false);
  };

  const doRefresh=async(ticker)=>{
    if(!apiKey.trim()){setModal("settings");return}
    setBusy(ticker);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey.trim(),
          "anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",max_tokens:800,
          tools:[{type:"web_search_20250305",name:"web_search"}],
          system:"Return ONLY valid JSON, no markdown, no explanation.",
          messages:[{role:"user",content:
            `Search for current stock data for ${ticker}. Return ONLY this JSON:\n{"price":"24.50","change":"-1.2%","high52":"76.51","low52":"23.53","mktcap":"4.2B","headlines":["headline 1","headline 2","headline 3"]}`
          }]
        })
      });
      const r=await res.json();
      const txt=(r.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
      const parsed=JSON.parse(txt.replace(/```[a-z]*|```/g,"").trim());
      setLive(l=>({...l,[ticker]:{...parsed,at:new Date().toLocaleTimeString()}}));
    }catch{
      setLive(l=>({...l,[ticker]:{error:"Refresh failed — check API key in ⚙ Settings",at:new Date().toLocaleTimeString()}}));
    }finally{setBusy(null)}
  };

  const addTicker=()=>{
    const s=newT.symbol.toUpperCase().trim();if(!s)return;
    persist({...data,tickerOrder:[...data.tickerOrder,s],
      tickers:{...data.tickers,[s]:{company:newT.company,sector:newT.sector,exchange:newT.exchange,quarters:[]}}});
    setModal(null);setNewT({symbol:"",company:"",sector:"",exchange:"NASDAQ"});
  };

  const addQuarter=()=>{
    if(!newQ.label)return;
    const q={id:`${sym}-${Date.now()}`,label:newQ.label,date:newQ.date||"",
      rev_est:newQ.rev_est?+newQ.rev_est:null,rev_act:newQ.rev_act?+newQ.rev_act:null,
      eps_est:newQ.eps_est?+newQ.eps_est:null,eps_act:newQ.eps_act?+newQ.eps_act:null,
      metrics:[{l:newQ.m1l||"Metric 1",v:newQ.m1v||""},{l:newQ.m2l||"Metric 2",v:newQ.m2v||""},{l:newQ.m3l||"Metric 3",v:newQ.m3v||""}],
      ah:newQ.ah||null,d1o:newQ.d1o||null,d1c:newQ.d1c||null,net:newQ.net||null,
      pre:newQ.pre||"",said:newQ.said||"",why:newQ.why||"",upd:newQ.upd||""};
    const d=JSON.parse(JSON.stringify(data));
    d.tickers[sym].quarters.push(q);
    persist(d);setModal(null);setNewQ({});
  };

  if(!data)return(
    <div className="page" style={{display:"flex",alignItems:"center",justifyContent:"center"}}>
      <span style={{color:"var(--nv)",fontFamily:"ui-monospace,monospace",fontSize:13,letterSpacing:".2em"}} className="pulse">LOADING...</span>
    </div>
  );

  const ticker=sym?data.tickers[sym]:null;
  const ld=live[sym]||{};

  /* DASHBOARD */
  if(view==="dash")return(
    <div className="page">
      <div className="top-bar safe-top safe-x">
        <div className="wrap row sb" style={{paddingTop:12,paddingBottom:12}}>
          <div>
            <div className="brand-label">EQUITY RESEARCH</div>
            <div className="brand-title">Coverage</div>
          </div>
          <div className="row gap" style={{alignItems:"flex-end",paddingBottom:2}}>
            <button className="btn-icon" onClick={()=>setModal("settings")}>⚙</button>
            <button className="btn ac sm" onClick={()=>setModal("ticker")}>+ Ticker</button>
          </div>
        </div>
      </div>

      <div className="wrap safe-x safe-bot" style={{paddingTop:16}}>
        <div className="stack">
          {data.tickerOrder.map(s=>{
            const t=data.tickers[s];if(!t)return null;
            const done=t.quarters.filter(q=>q.rev_act!=null);
            const last=done[done.length-1];
            return(
              <button key={s} className="ticker-card fade" onClick={()=>{setSym(s);setView("ticker")}}>
                <div className="row sb mb2">
                  <div>
                    <div style={{fontSize:20,fontWeight:700,color:"var(--navy)"}}>{s}</div>
                    <div style={{fontSize:12,color:"var(--s4)",marginTop:2}}>{t.company}</div>
                  </div>
                  {last?.ah&&<span className={`rxn-tag ${rxnCls(last.ah)}`}>{last.ah}</span>}
                </div>
                <div className="row gap" style={{flexWrap:"wrap"}}>
                  <span style={{fontSize:11,background:"var(--pl2)",color:"var(--mid)",padding:"3px 8px",borderRadius:6,border:"1px solid var(--pl)"}}>{t.sector}</span>
                  <span style={{fontSize:11,color:"var(--s4)"}}>{t.exchange}</span>
                  <span style={{fontSize:11,color:"var(--s5)",marginLeft:"auto"}}>{t.quarters.length} quarters</span>
                </div>
                {last&&<div style={{fontSize:11,color:"var(--s5)",marginTop:8}}>Latest: {last.label} · {last.date}</div>}
              </button>
            );
          })}
        </div>
      </div>

      {modal==="ticker"&&(
        <Modal title="Add Ticker" onClose={()=>setModal(null)}>
          <Field label="Ticker Symbol" k="symbol" ph="RKLB" s={newT} ss={setNewT}/>
          <Field label="Company Name" k="company" ph="Rocket Lab Corp." s={newT} ss={setNewT}/>
          <Field label="Sector" k="sector" ph="Aerospace" s={newT} ss={setNewT}/>
          <Field label="Exchange" k="exchange" ph="NASDAQ" s={newT} ss={setNewT}/>
          <div className="row gap mt4">
            <button className="btn ac f1" onClick={addTicker}>Add</button>
            <button className="btn ghost f1" onClick={()=>setModal(null)}>Cancel</button>
          </div>
        </Modal>
      )}

      {modal==="settings"&&(
        <Modal title="Settings" onClose={()=>setModal(null)}>
          <p style={{fontSize:12,color:"var(--s4)",lineHeight:1.6,marginBottom:14}}>
            Your Anthropic API key powers live price and news refresh. Stored only on this device.
            Get your key at console.anthropic.com.
          </p>
          <div className="field">
            <label className="lbl">Anthropic API Key</label>
            <input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="sk-ant-..." className="inp"/>
          </div>
          <div className="row gap mt3">
            <button className="btn ac f1" onClick={()=>{saveKey(apiKey);setModal(null)}}>Save</button>
            <button className="btn ghost f1" onClick={()=>setModal(null)}>Cancel</button>
          </div>
        </Modal>
      )}
    </div>
  );

  /* TICKER VIEW */
  const quarters=[...(ticker?.quarters||[])].reverse();
  return(
    <div className="page">
      <div className="top-bar sticky safe-top safe-x">
        <div className="wrap" style={{paddingTop:10,paddingBottom:10}}>
          <div className="row sb mb2">
            <div className="row">
              <button className="bc-back" onClick={()=>setView("dash")}>← Coverage</button>
              <span className="bc-sep">/</span>
              <span className="bc-sym">{sym}</span>
            </div>
            <div className="row gap">
              <button className="btn-refresh" onClick={()=>doRefresh(sym)} disabled={busy===sym}>
                {busy===sym?"...":"⟳ Refresh"}
              </button>
              <button className="btn ac sm" style={{fontWeight:700}} onClick={()=>{setNewQ({});setModal("quarter")}}>+ Quarter</button>
            </div>
          </div>
          <div className="row sb">
            <div>
              <div style={{fontWeight:700,color:"var(--navy)"}}>{ticker.company}</div>
              <div style={{fontSize:12,color:"var(--s4)"}}>{ticker.exchange} · {ticker.sector}</div>
            </div>
            {ld.price&&!ld.error&&(
              <div style={{textAlign:"right"}}>
                <div className="row base">
                  <span className="live-price">${ld.price}</span>
                  <span className={ld.change?.includes("-")?"chg-neg":"chg-pos"}>{ld.change}</span>
                </div>
                {ld.high52&&<div className="live-sub">52w ${ld.low52}–${ld.high52}</div>}
                <div className="live-sub">{ld.at}</div>
              </div>
            )}
            {ld.error&&<div style={{fontSize:11,color:"var(--no-t)",textAlign:"right",maxWidth:180}}>{ld.error}</div>}
          </div>
        </div>
      </div>

      <div className="wrap safe-x safe-bot" style={{paddingTop:12}}>
        <div className="stack">

          {/* Thesis box */}
          <div className="thesis-card">
            <div className="thesis-head">
              <span className="thesis-label">Investment Thesis</span>
              {!thesisEdit&&(
                <button className="btn-edit" style={{marginTop:0}}
                  onClick={()=>{setThesisDraft(ticker.thesis||"");setThesisEdit(true)}}>
                  ✏ Edit
                </button>
              )}
            </div>
            {thesisEdit?(
              <div>
                <textarea className="thesis-area"
                  value={thesisDraft}
                  onChange={e=>setThesisDraft(e.target.value)}
                  placeholder="Write your full thesis here — root need, key variables to watch, bull/bear cases, valuation framework, what would change your view..."
                />
                <div className="row gap" style={{padding:"0 14px 14px"}}>
                  <button className="btn ac sm" style={{fontWeight:700}} onClick={()=>saveThesis(sym)}>Save</button>
                  <button className="btn ghost sm" onClick={()=>setThesisEdit(false)}>Cancel</button>
                </div>
              </div>
            ):(
              <div className={`thesis-body${!ticker.thesis?" empty":""}`}>
                {ticker.thesis||"No thesis yet — tap Edit to add your research and investment view."}
              </div>
            )}
          </div>
          {ld.headlines&&(
            <div className="news-card fade">
              <div className="news-lbl">Recent News</div>
              {ld.headlines.map((h,i)=><div key={i} className="news-item">{h}</div>)}
            </div>
          )}

          {quarters.map(q=>{
            const pending=q.rev_act==null;
            const isOpen=open[q.id];
            const isEdit=editing===q.id;
            const revBM=bm(q.rev_est,q.rev_act);
            const epsBM=bm(q.eps_est,q.eps_act);
            const hasNotes=q.pre||q.said||q.why||q.upd;

            return(
              <div key={q.id} className={`card${pending?" upcoming":""} fade`}>
                <div className={`card-head${pending?" upcoming":""}`}>
                  <div className="row gap">
                    <span style={{fontWeight:700,color:pending?"var(--nv)":"var(--navy)"}}>{q.label}</span>
                    <span style={{fontSize:12,color:"var(--s4)"}}>{q.date}</span>
                    {pending&&<span style={{fontSize:11,background:"var(--pl2)",color:"var(--mid)",border:"1px solid var(--pl)",padding:"2px 8px",borderRadius:999}}>Upcoming</span>}
                  </div>
                  {q.ah&&<span className={`rxn-tag ${rxnCls(q.ah)}`}>{q.ah}</span>}
                </div>

                <div className="card-body">
                  <div className="grid2 mb2">
                    <Chip l="Rev Est ($M)" v={q.rev_est?`$${q.rev_est}M`:null}/>
                    <Chip l="Rev Actual ($M)" v={q.rev_act?`$${q.rev_act}M`:null}/>
                    <Chip l="Rev Beat/Miss"
                      v={revBM?`${revBM.pos?"+":""}${revBM.diff}M (${revBM.pos?"+":""}${revBM.pct}%)`:null}
                      beat={revBM?revBM.pos:null}/>
                    <Chip l="EPS Beat/Miss"
                      v={epsBM?`${epsBM.pos?"+":""}$${epsBM.diff} (${epsBM.pos?"+":""}${epsBM.pct}%)`:null}
                      beat={epsBM?epsBM.pos:null}/>
                  </div>

                  <div className="grid3 mb2">
                    {q.metrics.map((m,i)=><Chip key={i} l={m.l} v={m.v}/>)}
                  </div>

                  {!pending&&(
                    <div className="grid2 mb2">
                      {[["AH Reaction",q.ah,true],["D+1 Open",q.d1o,false],["D+1 Close",q.d1c,false],["48h Net",q.net,true]].map(([lbl,val,col])=>{
                        const rc=col&&val?rxnCls(val):"";
                        const cls=rc==="rxn-pos"?"chip ok":rc==="rxn-neg"?"chip no":"chip";
                        const style=rc==="rxn-neu"?{background:"var(--pl2)",borderColor:"var(--pl)"}:{};
                        return(
                          <div key={lbl} className={cls} style={style}>
                            <div className="cl">{lbl}</div>
                            <div className="cv" style={(!col||!val)?{color:"#94a3b8"}:{}}>{val||"—"}</div>
                          </div>
                        );
                      })}
                    </div>
                  )}

                  <button className="btn-expand" onClick={()=>toggle(q.id)}>
                    <span>{isOpen?"▲":"▼"}</span>
                    <span>{isOpen?"Hide Notes":hasNotes?"View Notes":"Add Notes"}</span>
                  </button>
                </div>

                {isOpen&&(
                  <div className="notes-area fade">
                    {isEdit?(
                      <div className="stack8">
                        {[["pre","Pre-Earnings Narrative"],["said","What the Quarter Said"],["why","Why Market Reacted"],["upd","Thesis Update"]].map(([k,lbl])=>(
                          <div key={k}>
                            <label className="lbl" style={{color:"var(--nv)"}}>{lbl}</label>
                            <textarea value={draft[k]||""} onChange={e=>setDraft(d=>({...d,[k]:e.target.value}))} rows={3}
                              className="edit-area" style={{fontSize:14}}/>
                          </div>
                        ))}
                        <div className="row gap pt2">
                          <button className="btn ac sm" style={{fontWeight:700}} onClick={()=>saveEdit(sym,q.id)}>Save</button>
                          <button className="btn ghost sm" onClick={()=>setEditing(null)}>Cancel</button>
                        </div>
                      </div>
                    ):(
                      <div>
                        <NoteBlock label="Pre-Earnings Narrative" text={q.pre}/>
                        <NoteBlock label="What the Quarter Said"   text={q.said}/>
                        <NoteBlock label="Why Market Reacted"      text={q.why}/>
                        <NoteBlock label="Thesis Update"           text={q.upd}/>
                        {!hasNotes&&<div style={{fontSize:12,color:"var(--s5)",fontStyle:"italic"}}>No notes yet.</div>}
                        <button className="btn-edit" onClick={()=>startEdit(q)}>✏ Edit Notes</button>
                      </div>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>

      {modal==="quarter"&&(
        <Modal title={`Add Quarter — ${sym}`} onClose={()=>setModal(null)}>
          <Field label="Quarter Label *" k="label" ph="Q1 FY27" s={newQ} ss={setNewQ}/>
          <Field label="Date" k="date" ph="May 2026" s={newQ} ss={setNewQ}/>
          <div className="grid2">
            {[["Rev Est ($M)","rev_est","150"],["Rev Actual","rev_act",""],
              ["EPS Est","eps_est","0.30"],["EPS Actual","eps_act",""],
              ["AH Reaction","ah","+5%"],["48h Net","net","+3%"],
              ["D+1 Open","d1o","~$30"],["D+1 Close","d1c","~$29"],
              ["Metric 1 Label","m1l","NRR"],["Metric 1 Value","m1v","115%"],
              ["Metric 2 Label","m2l","EBITDA Mgn"],["Metric 2 Value","m2v","55%"],
              ["Metric 3 Label","m3l","Metric 3"],["Metric 3 Value","m3v",""],
            ].map(([lbl,k,ph])=>(
              <div key={k} className="field">
                <label className="lbl">{lbl}</label>
                <input value={newQ[k]||""} onChange={e=>setNewQ(q=>({...q,[k]:e.target.value}))} placeholder={ph} className="inp"/>
              </div>
            ))}
          </div>
          <AreaField label="Pre-Earnings Narrative" k="pre" ph="Can fill in later..." s={newQ} ss={setNewQ} optional/>
          <AreaField label="What the Quarter Said"   k="said" ph="Can fill in later..." s={newQ} ss={setNewQ} optional/>
          <AreaField label="Why Market Reacted"      k="why" ph="Can fill in later..." s={newQ} ss={setNewQ} optional/>
          <AreaField label="Thesis Update"           k="upd" ph="Can fill in later..." s={newQ} ss={setNewQ} optional/>
          <div className="row gap mt4">
            <button className="btn ac f1" style={{fontWeight:700}} onClick={addQuarter}>Add Quarter</button>
            <button className="btn ghost f1" onClick={()=>setModal(null)}>Cancel</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
